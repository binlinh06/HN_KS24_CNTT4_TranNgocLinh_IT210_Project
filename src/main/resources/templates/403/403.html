<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>403 Forbidden</title>

    <style>

        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: red;
            font-size: 60px;
        }

        a {
            text-decoration: none;
            color: white;
            background: #007bff;
            padding: 10px 20px;
            border-radius: 5px;
        }

        p{
            padding-bottom: 20px;
        }
    </style>

</head>
<body>

<div class="box">

    <h1>403</h1>

    <h2>ACCESS DENIED</h2>

    <p>
        Bạn không có quyền truy cập trang này.
    </p>

    <a th:href="@{/home}">
        Về trang chủ
    </a>

</div>

</body>
</html>
