<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:replace="${title}">Admin Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #20B2AA;
            --accent: #0F766E;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
        }
        .navbar {
            background: linear-gradient(135deg, #20B2AA 0%, #0F766E 100%) !important;
            box-shadow: 0 4px 20px rgba(32, 178, 170, 0.3);
        }
        .sidebar {
            background-color: #0F172A;
            min-height: calc(100vh - 76px);
        }
        .sidebar .nav-link {
            color: #CBD5E1;
            padding: 12px 20px;
            margin: 4px 8px;
            border-radius: 10px;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background-color: #1E2937;
            color: white;
        }
        .main-content {
            padding: 2rem;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .table thead {
            background-color: #F1F5F9;
            font-weight: 600;
        }
        .btn-primary {
            background-color: var(--primary);
            border: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark py-3">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
            <i class="bi bi-shield-lock-fill me-2 fs-3"></i>
            ADMIN
        </a>

        <div class="ms-auto d-flex align-items-center gap-4">
            <span class="text-white">Xin chào, <strong>Ngọc Linh</strong></span>
            <a th:href="@{/auth/logout}" class="btn btn-danger btn-sm px-4">
                <i class="bi bi-box-arrow-right"></i> Đăng xuất
            </a>
        </div>
    </div>
</nav>

<div class="d-flex">
    <div class="sidebar col-lg-2 py-4">
        <ul class="nav flex-column">
            <li><a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
            <li><a class="nav-link" th:href="@{/admin/equipment}"><i class="bi bi-pc-display me-2"></i> Quản lý Thiết bị</a></li>
            <li><a class="nav-link" th:href="@{/admin/lab-types}"><i class="bi bi-door-open me-2"></i> Loại phòng Lab</a></li>
            <li><a class="nav-link" th:href="@{/admin/departments}"><i class="bi bi-building me-2"></i> Khoa / Ngành</a></li>
            <li><a class="nav-link" th:href="@{/admin/requests}"><i class="bi bi-clipboard-check me-2"></i> Duyệt yêu cầu mượn</a></li>
        </ul>
    </div>

    <div class="main-content flex-grow-1">
        <div th:replace="${content}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
