<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Teacher Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --teacher-primary: #4f46e5;
            --teacher-secondary: #4338ca;
            --sidebar-width: 260px;
        }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }

        /* Sidebar Pro Style */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            background: #ffffff;
            border-right: 1px solid #eef2f6;
            z-index: 1050;
        }
        .nav-link {
            color: #64748b;
            padding: 12px 20px;
            border-radius: 12px;
            margin: 4px 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }
        .nav-link:hover { background: #f1f5f9; color: var(--teacher-primary); }
        .nav-link.active {
            background: var(--teacher-primary);
            color: white !important;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.25);
        }
        .nav-link i { font-size: 1.2rem; margin-right: 12px; }

        /* Content & Header */
        .main-content { margin-left: var(--sidebar-width); padding: 100px 40px 40px; min-height: 100vh; }
        .top-nav {
            left: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eef2f6;
            z-index: 1040;
        }
        .user-dropdown-btn {
            background: #f1f5f9;
            border-radius: 50px;
            padding: 5px 15px 5px 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .user-dropdown-btn:hover { background: #e2e8f0; }
        .avatar-circle {
            width: 35px; height: 35px;
            background: var(--teacher-primary);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<aside class="sidebar d-flex flex-column">
    <div class="p-4 mb-3">
        <div class="d-flex align-items-center text-decoration-none">
            <div class="bg-primary bg-gradient p-2 rounded-3 me-2" style="background: linear-gradient(135deg, #6366f1, #4f46e5) !important;">
                <i class="bi bi-mortarboard-fill text-white fs-4"></i>
            </div>
            <span class="fs-4 fw-bold text-dark">MENTOR<span class="text-primary">.</span></span>
        </div>
    </div>

    <nav class="flex-grow-1" id="teacherSidebar">
        <a th:href="@{/teacher/dashboard}" class="nav-link">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a th:href="@{/teacher/mentoring-sessions}" class="nav-link">
            <i class="bi bi-people-fill"></i> Quản lý cố vấn
        </a>

        <a th:href="@{/teacher/evaluations/history}" class="nav-link">
            <i class="bi bi-journal-check"></i> Lịch sử đánh giá
        </a>

        <a th:href="@{/teacher/equipment-request}" class="nav-link">
            <i class="bi bi-tools"></i> Chỉ định thiết bị
        </a>
    </nav>

    <div class="p-4 border-top">
        <div class="d-flex align-items-center text-muted">
            <small>&copy; 2026 Teacher Portal</small>
        </div>
    </div>
</aside>

<header class="top-nav fixed-top p-3 px-4">
    <div class="d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold text-dark">Giảng viên Portal</h5>

        <div class="dropdown">
            <div class="user-dropdown-btn d-flex align-items-center gap-2" data-bs-toggle="dropdown">
                <div class="avatar-circle">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div class="text-start d-none d-sm-block">
                    <span class="fw-bold d-block lh-1 text-dark" style="font-size: 0.9rem;" th:text="${teacherName}">Teacher Name</span>
                    <small class="text-muted" style="font-size: 0.75rem;">Giảng viên</small>
                </div>
                <i class="bi bi-chevron-down text-muted ms-1" style="font-size: 0.8rem;"></i>
            </div>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4 mt-2 p-2">
                <li><a class="dropdown-item rounded-3 p-2" th:href="@{/teacher/profile}"><i class="bi bi-person me-2"></i>Hồ sơ</a></li>
                <li><a class="dropdown-item rounded-3 p-2" th:href="@{/teacher/settings}"><i class="bi bi-gear me-2"></i>Cài đặt</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/auth/logout}" method="post">
                        <button type="submit" class="dropdown-item rounded-3 p-2 text-danger">
                            <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</header>

<main class="main-content">
    <div th:replace="${content}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Tự động active menu dựa trên URL
    document.addEventListener("DOMContentLoaded", function() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('#teacherSidebar .nav-link');
        navLinks.forEach(link => {
            if (currentPath.includes(link.getAttribute('href'))) {
                link.classList.add('active');
            }
        });
    });
</script>
</body>
</html>
