<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:replace="${title}">Student Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #20B2AA;
            --accent: #0F766E;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
        }
        .navbar {
            background: linear-gradient(135deg, #20B2AA 0%, #0F766E 100%) !important;
            box-shadow: 0 4px 20px rgba(32, 178, 170, 0.3);
        }

        /* Hiệu ứng VIP cho các link trên thanh menu */
        .nav-link-vip {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 500;
            padding: 8px 16px !important;
            border-radius: 50rem; /* bo góc dạng viên thuốc */
            transition: all 0.3s ease;
        }
        .nav-link-vip:hover, .nav-link-vip.active {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .main-content {
            padding: 2rem;
            min-height: calc(100vh - 76px);
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .welcome-card {
            background: linear-gradient(135deg, #20B2AA, #0F766E);
            color: white;
            border-radius: 20px;
        }
        .btn-primary {
            background-color: var(--primary);
            border: none;
        }

        /* Tinh chỉnh cho giao diện Mobile */
        @media (max-width: 991px) {
            .navbar-nav { margin-top: 1rem; margin-bottom: 1rem; }
            .mobile-gap { flex-direction: column; align-items: stretch !important; gap: 10px; }
            .mobile-gap .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark py-3 sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/student/dashboard}">
            <i class="bi bi-mortarboard-fill me-2"></i>
            STUDENT PORTAL
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#studentMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="studentMenu">
            <ul class="navbar-nav ms-lg-4 me-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link nav-link-vip" th:href="@{/home}">
                        <i class="bi bi-house-door me-1"></i> Trang chủ
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-vip" th:href="@{/student/equipment}">
                        <i class="bi bi-laptop me-1"></i> Mượn thiết bị
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-vip" th:href="@{/student/mentoring-sessions/create}">
                        <i class="bi bi-person-video me-1"></i> Lịch cố vấn
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-vip" th:href="@{/student/history}">
                        <i class="bi bi-clock-history me-1"></i> Lịch sử
                    </a>
                </li>
            </ul>

            <div class="ms-auto d-flex align-items-center gap-3 mobile-gap mt-3 mt-lg-0">
                <a th:href="@{/student/profile}" class="btn btn-light d-flex align-items-center gap-2 rounded-pill px-3 shadow-sm hover-lift">
                    <i class="bi bi-person-circle text-primary"></i>
                    <span class="fw-medium">Hồ sơ</span>
                </a>
                <a th:href="@{/auth/logout}" class="btn btn-danger d-flex align-items-center gap-2 rounded-pill px-3 shadow-sm hover-lift">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="fw-medium">Đăng xuất</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="main-content container-fluid">
    <div th:replace="${content}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
