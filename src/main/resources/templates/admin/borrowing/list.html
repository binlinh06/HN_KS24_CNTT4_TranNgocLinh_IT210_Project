<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Phiếu Mượn | Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #20B2AA;
      --accent: #0F766E;
      --sidebar-bg: #0F172A;
    }
    body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
    .navbar { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); }
    .brand-title { font-size: 1.5rem; font-weight: 700; color: white; }
    .sidebar { background-color: var(--sidebar-bg); min-height: calc(100vh - 76px); }
    .sidebar .nav-link { color: #CBD5E1; padding: 12px 20px; margin: 4px 8px; border-radius: 10px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #1E2937; color: white; }
    .card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark py-3">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <i class="bi bi-shield-lock-fill me-2 fs-2"></i>
      <span class="brand-title">ADMIN PORTAL</span>
    </a>
  </div>
</nav>

<div class="d-flex">
  <div class="sidebar col-lg-2 py-4">
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link" href="#"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" th:href="@{/admin/borrowing/list}"><i class="bi bi-arrow-left-right me-2"></i> Quản lý phiếu mượn</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/admin/equipment}"><i class="bi bi-pc-display me-2"></i> Thiết bị thực hành</a>
      </li>
    </ul>
  </div>

  <div class="main-content flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold text-dark">Danh sách Phiếu mượn thiết bị</h2>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm rounded-3 mb-4">
      <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm rounded-3 mb-4">
      <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card overflow-hidden">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-light">
            <tr>
              <th class="ps-4 py-3">Mã phiếu</th>
              <th class="py-3">Sinh viên</th>
              <th class="py-3">Số lượng thiết bị</th>
              <th class="py-3">Ngày tạo</th>
              <th class="py-3">Trạng thái</th>
              <th class="text-end pe-4 py-3">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="req : ${recentRequests}">
              <td class="ps-4"><strong class="text-primary" th:text="${'#PM-' + req.id}"></strong></td>

              <td class="fw-medium text-dark" th:text="${req.student.profile != null ? req.student.profile.fullName : req.student.username}"></td>

              <td><span class="badge bg-secondary rounded-pill" th:text="${#lists.size(req.details)}"></span> thiết bị</td>

              <td th:text="${#temporals.format(req.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

              <td>
                                <span class="badge px-2 py-1"
                                      th:classappend="${req.status.name() == 'APPROVED'} ? 'bg-warning text-dark' :
                                                     (${req.status.name() == 'BORROWED'} ? 'bg-info text-dark' :
                                                     (${req.status.name() == 'RETURNED'} ? 'bg-success' : 'bg-danger'))"
                                      th:text="${req.status.name() == 'APPROVED'} ? 'Chờ xuất kho' :
                                              (${req.status.name() == 'BORROWED'} ? 'Đang mượn' :
                                              (${req.status.name() == 'RETURNED'} ? 'Đã trả' : 'Đã hủy'))">
                                </span>
              </td>

              <td class="text-end pe-4">
                <div th:if="${req.status.name() == 'APPROVED'}">
                  <form th:action="@{/admin/borrowing/export/{id}(id=${req.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-primary shadow-sm" onclick="return confirm('Xác nhận cấp phát các thiết bị trong phiếu này?');">
                      <i class="bi bi-box-arrow-up me-1"></i> Xuất kho
                    </button>
                  </form>
                </div>
                <span th:unless="${req.status.name() == 'APPROVED'}" class="text-muted small">
                                    <i class="bi bi-check2-all"></i> Đã xử lý
                                </span>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(recentRequests)}">
              <td colspan="6" class="text-center py-5 text-muted">
                <i class="bi bi-inbox fs-1 d-block mb-3 opacity-50"></i>
                <h6 class="fw-medium">Chưa có phiếu mượn nào trong hệ thống</h6>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
