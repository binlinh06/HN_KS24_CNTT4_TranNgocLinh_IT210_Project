<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f4f8;
            background-image: radial-gradient(at 0% 0%, #e0f2f1 0px, transparent 50%),
            radial-gradient(at 100% 100%, #ffffff 0px, transparent 50%);
        }

        /* ⚠️ đổi tên container để tránh conflict Bootstrap */
        .main-box {
            width: 900px;
            height: 500px;
            display: flex;
            background: #ffffff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .left {
            flex: 1;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left h1 {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .left p {
            opacity: 0.9;
        }

        .right {
            flex: 1;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        form {
            width: 100%;
            max-width: 320px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 2px solid #dfe6e9;
            background: transparent;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        label {
            position: absolute;
            left: 0;
            top: 10px;
            color: #b2bec3;
            transition: 0.3s;
            pointer-events: none;
        }

        input:focus + label,
        input:valid + label {
            top: -15px;
            font-size: 12px;
            color: #00b894;
        }

        input:focus {
            border-bottom: 2px solid #00b894;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #00b894;
            color: white;
            font-weight: 700;
            transition: 0.3s;
        }

        button:hover {
            background: #00cec9;
            transform: scale(1.02);
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #636e72;
        }

        .footer a {
            color: #00b894;
            text-decoration: none;
            font-weight: 700;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ALERT đẹp hơn */
        #login-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
            border-left: 5px solid #dc3545;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<div class="main-box">

    <div class="left">
        <h1>Welcome Back 👋</h1>
        <p>Đăng nhập để tiếp tục trải nghiệm hệ thống của chúng tôi.</p>
    </div>

    <div class="right">
        <form th:action="@{/auth/login}" method="post" th:object="${loginRequest}">

            <div th:if="${error}" class="custom-alert alert alert-danger alert-dismissible fade show" style="position: fixed; top: 20px; right: 20px; z-index: 9999; border-left: 5px solid #dc3545; animation: slideIn 0.4s ease;">
                <strong th:text="${error}"></strong>
            </div>

            <div th:if="${success}" class="custom-alert alert alert-success alert-dismissible fade show" style="position: fixed; top: 20px; right: 20px; z-index: 9999; border-left: 5px solid #198754; animation: slideIn 0.4s ease;">
                <strong th:text="${success}"></strong>
            </div>

            <div class="input-group">

            <div class="input-group">
                <input type="text" th:field="*{username}" required>
                <label>Tài khoản</label>
            </div>

            <div class="input-group">
                <input type="password" th:field="*{password}" required>
                <label>Mật khẩu</label>
            </div>

            <button type="submit">Đăng nhập</button>

            <div class="footer">
                Chưa có tài khoản?
                <a th:href="@{/auth/register}">Đăng ký</a>
            </div>

        </form>
    </div>

</div>

<script>
    // Tìm tất cả các alert có class 'custom-alert'
    const alerts = document.querySelectorAll('.custom-alert');
    alerts.forEach(alertElement => {
        setTimeout(() => {
            alertElement.classList.remove('show');
            setTimeout(() => alertElement.remove(), 400); // Đợi animation mờ dần rồi xóa hẳn
        }, 3000);
    });
</script>

</body>
</html>
